name: Build

on:
  push:
    branches: [ "main" ]
    tags:     [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build (MinGW-w64, Windows)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout
      # ----------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Set up MSYS2 + MinGW-w64 toolchain
      # ----------------------------------------------------------------
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-make

      # ----------------------------------------------------------------
      # 3. Configure
      # ----------------------------------------------------------------
      - name: Configure CMake
        run: |
          cmake -B build \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Windows

      # ----------------------------------------------------------------
      # 4. Build
      # ----------------------------------------------------------------
      - name: Build
        run: cmake --build build --config Release --parallel

      # ----------------------------------------------------------------
      # 5. Build installer with NSIS (GPL, every commit)
      #    NSIS is pre-installed on windows-latest runners
      # ----------------------------------------------------------------
      - name: Build NSIS installer
        shell: pwsh
        run: |
          $buildDir = "${{ github.workspace }}\build"
          $srcDir   = "${{ github.workspace }}"
          $nsisExe  = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $nsisExe)) {
            # Install NSIS if not present
            choco install nsis --yes --no-progress | Out-Null
          }
          & $nsisExe /V2 `
            /DBUILDDIR="$buildDir" `
            /DSRCDIR="$srcDir" `
            "$srcDir\installer\installer.nsi"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: BonjourServiceAdvertiserSetup-exe
          path: build\BonjourServiceAdvertiserSetup.exe
          if-no-files-found: error

  # ----------------------------------------------------------------
  # Release — attach artifacts to the GitHub release on tag push
  # ----------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: BonjourServiceAdvertiserSetup-exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            BonjourServiceAdvertiserSetup.exe
          generate_release_notes: true
